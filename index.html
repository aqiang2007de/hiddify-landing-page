<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN MMHUB - Outline Connect</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #161b22; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #30363d; width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #58a6ff; font-size: 26px; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
        .btn { background-color: #238636; color: white; padding: 12px 20px; border-radius: 6px; text-decoration: none; display: block; font-weight: bold; margin: 10px 0; transition: 0.2s; border: none; cursor: pointer; width: 100%; box-sizing: border-box; font-size: 16px; }
        .btn:hover { background-color: #2ea043; }
        .btn-blue { background-color: #1f6feb; }
        .btn-blue:hover { background-color: #388bfd; }
        .divider { height: 1px; background-color: #30363d; margin: 25px 0; position: relative; }
        .divider-text { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #161b22; padding: 0 10px; color: #8b949e; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 VPN MMHUB</h2>
        <p id="status-text">Click the button below to automatically import your access key to Outline VPN.</p>
        
        <button onclick="openOutline()" class="btn">🚀 Open Outline</button>
        <button onclick="copyKey()" class="btn btn-blue">📋 Copy Access Key</button>

        <div class="divider">
            <span class="divider-text">Download App</span>
        </div>

        <p><strong>Download Outline (If not installed)</strong></p>

        <a href="https://apps.apple.com/app/outline-app/id1356177741" target="_blank" class="btn btn-blue">🍎 Apple (iOS / Mac)</a>
        <a href="https://play.google.com/store/apps/details?id=org.outline.android.client" target="_blank" class="btn btn-blue">🤖 Android</a>
        <a href="https://s3.amazonaws.com/outline-releases/client/windows/stable/Outline-Client.exe" target="_blank" class="btn btn-blue">💻 Windows</a>
    </div>

    <script>
        // 获取 URL 中的密钥参数 (?sub=... 或 ?key=...)
        const params = new URLSearchParams(window.location.search);
        let accessKey = params.get('sub') || params.get('key');

        function openOutline() {
            if (!accessKey) {
                alert("No access key found. Please check your link.");
                return;
            }
            
            // 如果是 ss:// 协议，针对安卓尝试 Intent 唤起
            if (accessKey.startsWith("ss://")) {
                const intent = "intent://" + accessKey.replace("ss://", "") +
                    "#Intent;scheme=ss;package=org.outline.android.client;end";
                window.location.href = intent;
            } else {
                // 如果是 ssconf:// 协议直接跳转
                window.location.href = accessKey;
            }
        }

        function copyKey() {
            if (!accessKey) {
                alert("No key to copy.");
                return;
            }
            const textarea = document.createElement("textarea");
            textarea.value = accessKey;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            alert("Key Copied!");
        }

        // 页面加载时自动执行复制
        if (accessKey) {
            copyKey();
            // 提示用户已经自动复制
            document.getElementById('status-text').innerText = "Key copied! Now click 'Open Outline' to connect.";
        }
    </script>

</body>
</html>
