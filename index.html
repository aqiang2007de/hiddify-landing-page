<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outline Import</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}
.copy-box {
    background: #f7f7f7;
    padding: 15px;
    margin: 20px 0;
    word-break: break-all;
}
.button {
    background: #007bff;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🚀 Connecting to Outline...</h2>

<p>If not working, click button below</p>

<div id="manual" style="display:none;">
    <div class="copy-box" id="keyBox"></div>

    <button class="button" onclick="openOutline()">🚀 Open Outline</button>
    <button class="button" onclick="copyKey()">📋 Copy Key</button>

    <br>

    <a href="https://getoutline.org" target="_blank">Download Outline</a>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const key = params.get('sub'); // 这里就是 ss://

if (key) {

    // 1️⃣ 自动复制
    navigator.clipboard.writeText(key).catch(() => {});

    // 2️⃣ 尝试打开 Outline（安卓）
    const intent = "intent://" + key.replace("ss://", "") +
        "#Intent;scheme=ss;package=org.outline.android.client;end";

    window.location.href = intent;

    // 3️⃣ fallback
    setTimeout(() => {
        document.getElementById('manual').style.display = 'block';
        document.getElementById('keyBox').textContent = key;
    }, 1500);

} else {
    document.getElementById('manual').style.display = 'block';
    document.getElementById('keyBox').textContent = "No key provided";
}


// 手动打开
function openOutline() {
    const key = document.getElementById('keyBox').textContent;

    const intent = "intent://" + key.replace("ss://", "") +
        "#Intent;scheme=ss;package=org.outline.android.client;end";

    window.location.href = intent;
}

// 复制
function copyKey() {
    const key = document.getElementById('keyBox').textContent;

    navigator.clipboard.writeText(key).then(() => {
        alert("Copied!");
    });
}

</script>

</body>
</html>
