<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outline Connect</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background-color: #ffffff;
}
.button {
    background: #007bff;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    margin: 10px;
    font-size: 16px;
    display: inline-block;
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
}
.button:active {
    opacity: 0.8;
}
.download-section {
    margin-top: 40px;
    border-top: 1px dashed #ccc;
    padding-top: 20px;
}
</style>
</head>

<body>

<h2>🚀 Connect to Outline</h2>
<p>👇 Click button to connect or copy key manually</p>

<div id="actionArea">
    <button class="button" onclick="openOutline()">🚀 Open Outline</button>
    <button class="button" onclick="copyKey()">📋 Copy Key</button>
</div>

<div class="download-section">
    <p><strong>📥 Download Outline (If not installed)</strong></p>

    <a href="https://apps.apple.com/app/outline-app/id1356177741" target="_blank" class="button">
        🍎 Apple (iPhone / iPad / Mac)
    </a>
    <br>
    <a href="https://play.google.com/store/apps/details?id=org.outline.android.client" target="_blank" class="button">
        🤖 Android
    </a>
    <br>
    <a href="https://s3.amazonaws.com/outline-releases/client/windows/stable/Outline-Client.exe" target="_blank" class="button">
        💻 Windows
    </a>
</div>

<script>
// 全局存储密钥
let accessKey = "";

// 获取网址参数
const params = new URLSearchParams(window.location.search);
accessKey = params.get('sub');

// 初始检查
if (!accessKey) {
    alert("Warning: No access key provided in the URL.");
} else {
    // 自动执行一次复制，提高用户体验
    autoCopy(accessKey);
}

// 打开 Outline
function openOutline() {
    if (!accessKey) {
        alert("No key to open!");
        return;
    }
    
    // 如果是 ss:// 格式，使用 intent 协议尝试唤起 Android 客户端
    // 如果是 ssconf:// 格式，直接跳转即可
    if (accessKey.startsWith("ss://")) {
        const intent = "intent://" + accessKey.replace("ss://", "") +
            "#Intent;scheme=ss;package=org.outline.android.client;end";
        window.location.href = intent;
    } else {
        window.location.href = accessKey;
    }
}

// 手动点击按钮复制
function copyKey() {
    if (!accessKey) {
        alert("No key to copy!");
        return;
    }
    autoCopy(accessKey);
    alert("Key Copied Successfully!");
}

// 自动复制核心函数
function autoCopy(text) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

// 兼容性复制方案
function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";  // 防止页面滚动
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand("copy");
    } catch (err) {
        console.error("Copy failed", err);
    }
    document.body.removeChild(textarea);
}
</script>

</body>
</html>
