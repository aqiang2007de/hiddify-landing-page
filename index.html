<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outline Connect</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}
.copy-box {
    background: #f7f7f7;
    padding: 15px;
    margin: 20px 0;
    word-break: break-all;
}
.button {
    background: #007bff;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    margin: 10px;
    font-size: 16px;
    display: inline-block;
    text-decoration: none;
}
.button:active {
    opacity: 0.8;
}
</style>
</head>

<body>

<h2>🚀 Connect to Outline</h2>

<p>👇 Click button to connect or copy key manually</p>

<div id="manual" style="display:none;">
    
    <div class="copy-box" id="keyBox"></div>

    <button class="button" onclick="openOutline()">🚀 Open Outline</button>
    <button class="button" onclick="copyKey()">📋 Copy Key</button>

    <!-- 下载区域 -->
    <div style="margin-top:30px;">
        <p><strong>📥 Download Outline (If not installed)</strong></p>

        <a href="https://apps.apple.com/app/outline-app/id1356177741" target="_blank" class="button">
            🍎 Apple (iPhone / iPad / Mac)
        </a>

        <br>

        <a href="https://play.google.com/store/apps/details?id=org.outline.android.client" target="_blank" class="button">
            🤖 Android
        </a>

        <br>

        <a href="https://s3.amazonaws.com/outline-releases/client/windows/stable/Outline-Client.exe" target="_blank" class="button">
            💻 Windows
        </a>
    </div>

</div>

<script>

// 获取参数
const params = new URLSearchParams(window.location.search);
const key = params.get('sub');

if (key) {

    // 显示密钥
    document.getElementById('manual').style.display = 'block';
    document.getElementById('keyBox').textContent = key;

    // 自动复制
    autoCopy(key);

} else {

    document.getElementById('manual').style.display = 'block';
    document.getElementById('keyBox').textContent = "No key provided";

}


// 打开 Outline（手动点击）
function openOutline() {
    const key = document.getElementById('keyBox').textContent;

    const intent = "intent://" + key.replace("ss://", "") +
        "#Intent;scheme=ss;package=org.outline.android.client;end";

    window.location.href = intent;
}


// 手动复制
function copyKey() {
    const key = document.getElementById('keyBox').textContent;
    autoCopy(key);
    alert("Copied!");
}


// 自动复制（兼容）
function autoCopy(text) {

    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}


// 兼容旧浏览器
function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
}

</script>

</body>
</html>
